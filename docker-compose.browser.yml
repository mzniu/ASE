# 与 docker-compose.yml 叠加：ASE 使用带 Chromium 的镜像，并打开基于浏览器的 Provider。
# 用法：docker compose -f docker-compose.yml -f docker-compose.browser.yml up -d --build
#
# 另需在宿主机 .env 中设置（勿提交仓库）：
#   TAVILY_API_KEY=tvly-...          # 注册 tavily Provider（HTTP API，不依赖浏览器）
#   SEARCH_DEFAULT_PROVIDERS=...     # 例如 baidu,bing,google,tavily
#   AUTH_VALID_API_KEYS / DEV_API_KEY 等
services:
  ase:
    build:
      context: .
      dockerfile: Dockerfile.browser
    environment:
      CHROME_EXEC_PATH: /usr/bin/chromium
      BAIDU_BROWSER_ENABLED: "true"
      BING_BROWSER_ENABLED: "true"
      GOOGLE_BROWSER_ENABLED: "true"
      TAVILY_API_KEY: ${TAVILY_API_KEY:-}
    # 无头 Chrome 在默认 64MB shm 下易崩溃，建议加大
    shm_size: "2gb"
