# 一次编排：OpenSearch + ASE API（默认网络内 API 通过 http://opensearch:9200 访问索引）。
# 用法：docker compose up --build -d
# 宿主机端口：默认映射 18080→ASE；若本机已占用（如已 go run），可在仓库根目录 .env 中设置 ASE_HOST_PORT=18081 后重试。
# 仅索引（旧行为）：docker compose up -d opensearch
#
# OpenSearch 为开发向配置（plugins.security.disabled — 勿对公网暴露）。
#
# 若容器反复 exit(1)，常见原因：
# 1) Linux/WSL2 内核 vm.max_map_count 过低 — 见 README「Docker 与 OpenSearch」排障。
# 2) 数据卷损坏 — docker compose down -v 后重新 up（会清空索引数据）。
# 3) 内存不足 — 下面 JVM 已改为 256m，若仍 OOM 请关闭其它容器或加大 Docker 内存配额。
services:
  opensearch:
    image: opensearchproject/opensearch:2.17.0
    # JVM 内存锁定与文件句柄；缺省时 OpenSearch 常因 bootstrap 检查失败而立即退出
    cap_add:
      - IPC_LOCK
    ulimits:
      memlock:
        soft: -1
        hard: -1
      nofile:
        soft: 65536
        hard: 65536
    environment:
      - discovery.type=single-node
      - plugins.security.disabled=true
      # OpenSearch 2.12+：镜像启动脚本仍要求设置（即使已禁用安全插件），否则 install_demo_configuration 直接退出
      # 仅用于本地/内网开发；生产请使用正式安全策略，勿对公网暴露无 TLS 的节点
      - OPENSEARCH_INITIAL_ADMIN_PASSWORD=AseDev-local-2026!ChangeMe
      # 单机开发用较小堆，降低小内存机器上 OOM 概率
      - OPENSEARCH_JAVA_OPTS=-Xms256m -Xmx256m
      # 避免小磁盘/开发环境触发高水位导致分片分配失败
      - "cluster.routing.allocation.disk.threshold_enabled=false"
    ports:
      - "9200:9200"
    volumes:
      - opensearch-data:/usr/share/opensearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:9200 >/dev/null"]
      interval: 5s
      timeout: 5s
      retries: 24
      start_period: 90s

  ase:
    build: .
    ports:
      - "${ASE_HOST_PORT:-18080}:18080"
    # 无头 Chrome 在默认 64MB shm 下易崩溃
    shm_size: "2gb"
    environment:
      HTTP_ADDR: ":18080"
      OPENSEARCH_URLS: "http://opensearch:9200"
      OPENSEARCH_INDEX: "ase_documents"
      CHROME_EXEC_PATH: /usr/bin/chromium
      BAIDU_BROWSER_ENABLED: "true"
      BING_BROWSER_ENABLED: "true"
      GOOGLE_BROWSER_ENABLED: "true"
      TAVILY_API_KEY: ${TAVILY_API_KEY:-}
      PROVIDER_FETCH_RESULT_URLS: ${PROVIDER_FETCH_RESULT_URLS:-true}
      # 未在 JSON 里写 providers 时仅默认走百度；可在 .env 覆盖 SEARCH_DEFAULT_PROVIDERS
      SEARCH_DEFAULT_PROVIDERS: ${SEARCH_DEFAULT_PROVIDERS:-baidu}
      AUTH_VALID_API_KEYS: ${AUTH_VALID_API_KEYS:-}
      DEV_API_KEY: ${DEV_API_KEY:-dev-only}
      # Admin 管理页 /admin/：三者齐全才启用（见 docs/ADMIN_ENABLE.md）；在仓库根 .env 中配置后 compose 会注入
      ADMIN_USERNAME: ${ADMIN_USERNAME:-}
      ADMIN_PASSWORD_BCRYPT: ${ADMIN_PASSWORD_BCRYPT:-}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-}
      ADMIN_SESSION_SECRET: ${ADMIN_SESSION_SECRET:-}
      ADMIN_SESSION_TTL_SECONDS: ${ADMIN_SESSION_TTL_SECONDS:-86400}
    depends_on:
      opensearch:
        condition: service_healthy

volumes:
  opensearch-data: {}
